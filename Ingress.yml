apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: examportal-ingress
  namespace: exam
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: selfsigned-issuer
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - "34.219.21.193.nip.io"
      secretName: examportal-tls
  rules:
    - host: "34.219.21.193.nip.io"
      http:
        paths:
          - path: /back(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-svc
                port:
                  number: 3000

